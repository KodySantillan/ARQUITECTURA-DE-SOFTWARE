<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kody Santillan | Arquitectura de Software</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#050810;--card-bg:rgba(13,17,23,0.82);--accent:#00e5ff;--accent2:#7c3aed;--accent3:#10b981;--text:#e2e8f0;--muted:#64748b;--border:rgba(0,229,255,0.15);--input-bg:rgba(255,255,255,0.04);--input-border:rgba(255,255,255,0.08);}
    [data-theme="light"]{--bg:#f0f4f8;--card-bg:rgba(255,255,255,0.92);--accent:#0284c7;--accent2:#7c3aed;--accent3:#059669;--text:#1e293b;--muted:#64748b;--border:rgba(2,132,199,0.2);--input-bg:rgba(0,0,0,0.04);--input-border:rgba(0,0,0,0.1);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;transition:background 0.3s;}
    canvas{position:fixed;inset:0;z-index:0;opacity:0.35;}
    [data-theme="light"] canvas{opacity:0.12;}
    .grid-overlay{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(0,229,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.025) 1px,transparent 1px);background-size:60px 60px;}
    [data-theme="light"] .grid-overlay{opacity:0.4;}
    .orb{position:fixed;border-radius:50%;filter:blur(110px);pointer-events:none;z-index:1;}
    .orb-1{width:450px;height:450px;background:rgba(124,58,237,0.18);top:-80px;left:-80px;animation:drift1 14s ease-in-out infinite;}
    .orb-2{width:380px;height:380px;background:rgba(0,229,255,0.10);bottom:-80px;right:-80px;animation:drift2 17s ease-in-out infinite;}
    @keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(50px,35px)}}
    @keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-35px,-50px)}}
    .theme-toggle{position:fixed;top:18px;right:18px;z-index:200;background:var(--card-bg);border:1px solid var(--border);border-radius:50px;padding:7px 14px;cursor:pointer;font-size:0.75rem;color:var(--muted);backdrop-filter:blur(16px);transition:all 0.2s;display:flex;align-items:center;gap:6px;}
    .theme-toggle:hover{color:var(--accent);border-color:var(--accent);}
    .card{position:relative;z-index:10;background:var(--card-bg);border:1px solid var(--border);border-radius:22px;padding:48px 56px;max-width:460px;width:90%;backdrop-filter:blur(28px);box-shadow:0 0 80px rgba(0,229,255,0.05),inset 0 1px 0 rgba(255,255,255,0.05);animation:cardIn 0.7s cubic-bezier(0.16,1,0.3,1) both;text-align:center;}
    .card::before,.card::after{content:'';position:absolute;width:18px;height:18px;border-color:var(--accent);border-style:solid;}
    .card::before{top:14px;left:14px;border-width:2px 0 0 2px;}
    .card::after{bottom:14px;right:14px;border-width:0 2px 2px 0;}
    @keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(0.96)}to{opacity:1;transform:translateY(0) scale(1)}}
    .logo-container{display:flex;justify-content:center;margin-bottom:18px;}
    .logo-img{width:76px;height:76px;border-radius:50%;object-fit:cover;border:2px solid var(--border);box-shadow:0 0 24px rgba(0,229,255,0.15);}
    .badge{display:inline-flex;align-items:center;gap:8px;background:rgba(0,229,255,0.07);border:1px solid rgba(0,229,255,0.18);border-radius:50px;padding:5px 14px;font-size:0.65rem;letter-spacing:0.15em;color:var(--accent);text-transform:uppercase;margin-bottom:16px;}
    .badge-dot{width:6px;height:6px;background:var(--accent3);border-radius:50%;animation:blink 1.4s ease-in-out infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
    .name{font-family:'Syne',sans-serif;font-size:2.4rem;font-weight:800;line-height:1.05;letter-spacing:-0.02em;margin-bottom:6px;text-align:center;}
    .name span{display:block;background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    [data-theme="light"] .name span{background:linear-gradient(135deg,#1e293b 0%,var(--accent) 100%);-webkit-background-clip:text;background-clip:text;}
    .welcome-text{font-size:0.78rem;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:26px;padding-bottom:20px;border-bottom:1px solid var(--border);}
    .field{margin-bottom:16px;text-align:left;}
    .field label{display:block;font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
    .field input{width:100%;background:var(--input-bg);border:1px solid var(--input-border);border-radius:10px;padding:12px 15px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.88rem;transition:border-color 0.2s,box-shadow 0.2s;outline:none;}
    .field input::placeholder{color:rgba(100,116,139,0.6);}
    .field input:focus{border-color:rgba(0,229,255,0.4);box-shadow:0 0 0 3px rgba(0,229,255,0.06);}
    .error{background:rgba(239,68,68,0.09);border:1px solid rgba(239,68,68,0.25);border-radius:8px;padding:9px 13px;font-size:0.76rem;color:#fca5a5;margin-bottom:14px;display:none;text-align:left;}
    .btn-main{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent2),#6d28d9);border:none;border-radius:10px;color:white;font-family:'DM Mono',monospace;font-size:0.82rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.3s;margin-bottom:10px;}
    .btn-main:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(124,58,237,0.4);}
    .btn-main:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
    .btn-guest{width:100%;padding:12px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-family:'DM Mono',monospace;font-size:0.76rem;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.3s;}
    .btn-guest:hover{border-color:rgba(0,229,255,0.3);color:var(--accent);}
    .divider{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--muted);font-size:0.65rem;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
    .meta{margin-top:20px;padding-top:14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:0.62rem;color:var(--muted);}
    .meta span{color:var(--accent3);}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
    .shake{animation:shake 0.38s ease;}
    @media(max-width:480px){.card{padding:36px 22px;}.name{font-size:2rem;}}
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="grid-overlay"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Oscuro</button>

  <div class="card" id="card">
    <div class="logo-container"><img src="logo.jpg" alt="UPLA" class="logo-img"></div>
    <div class="badge"><span class="badge-dot"></span> Portafolio Académico</div>
    <div class="name"><span>Kody</span><span>Santillan</span></div>
    <p class="welcome-text">Bienvenidos</p>
    <div class="field"><label>Usuario</label><input type="text" id="user" placeholder="ingresa tu usuario"></div>
    <div class="field"><label>Contraseña</label><input type="password" id="pass" placeholder="••••••••"></div>
    <div class="error" id="err"></div>
    <button class="btn-main" id="loginBtn" onclick="doLogin()">→ Ingresar</button>
    <div class="divider">o</div>
    <button class="btn-guest" onclick="guestLogin()">Acceder como visitante (solo lectura)</button>
    <div class="meta"><div>2026</div><div>Modo: <span>privado</span></div></div>
  </div>

  <script>
    const canvas=document.getElementById('bg'),ctx=canvas.getContext('2d');
    let W,H,pts=[];
    const resize=()=>{W=canvas.width=innerWidth;H=canvas.height=innerHeight;};
    resize();window.addEventListener('resize',resize);
    for(let i=0;i<70;i++)pts.push({x:Math.random()*2000,y:Math.random()*1200,vx:(Math.random()-.5)*.28,vy:(Math.random()-.5)*.28,r:Math.random()*1.4+.4});
    function draw(){ctx.clearRect(0,0,W,H);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(0,229,255,0.65)';ctx.fill();});pts.forEach((a,i)=>pts.slice(i+1).forEach(b=>{const d=Math.hypot(a.x-b.x,a.y-b.y);if(d<120){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(0,229,255,${0.14*(1-d/120)})`;ctx.lineWidth=.5;ctx.stroke();}}));requestAnimationFrame(draw);}
    draw();
    function toggleTheme(){const html=document.documentElement;const isDark=html.getAttribute('data-theme')==='dark';html.setAttribute('data-theme',isDark?'light':'dark');document.getElementById('themeBtn').textContent=isDark?'☀️ Claro':'🌙 Oscuro';localStorage.setItem('theme',isDark?'light':'dark');}
    const saved=localStorage.getItem('theme');if(saved){document.documentElement.setAttribute('data-theme',saved);document.getElementById('themeBtn').textContent=saved==='light'?'☀️ Claro':'🌙 Oscuro';}
    function doLogin(){const u=document.getElementById('user').value.trim();const p=document.getElementById('pass').value.trim();const err=document.getElementById('err');err.style.display='none';if(!u||!p){showErr('Completa ambos campos.');return;}if(u==='kody'&&p==='kody2003'){sessionStorage.setItem('role','owner');sessionStorage.setItem('user',u);const btn=document.getElementById('loginBtn');btn.textContent='✓ Accediendo...';btn.disabled=true;setTimeout(()=>location.href='portafolio.html',1100);}else{showErr('Usuario o contraseña incorrectos.');}}
    function guestLogin(){sessionStorage.setItem('role','guest');sessionStorage.setItem('user','visitante');setTimeout(()=>location.href='portafolio.html',350);}
    function showErr(m){const e=document.getElementById('err');e.textContent=m;e.style.display='block';const c=document.getElementById('card');c.classList.add('shake');setTimeout(()=>c.classList.remove('shake'),400);}
    document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
    if(sessionStorage.getItem('role'))location.href='portafolio.html';
  </script>
</body>
</html>
